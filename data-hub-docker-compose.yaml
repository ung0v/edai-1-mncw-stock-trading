services:
  airflow-webserver:
    environment:
      AIRFLOW__DATAHUB__ENABLED: "true"
      AIRFLOW_CONN_DATAHUB_REST_DEFAULT: '{"conn_type":"datahub_rest","host":"http://datahub-gms:8080"}'

  airflow-scheduler:
    environment:
      AIRFLOW__DATAHUB__ENABLED: "true"
      AIRFLOW_CONN_DATAHUB_REST_DEFAULT: '{"conn_type":"datahub_rest","host":"http://datahub-gms:8080"}'

  airflow-init:
    environment:
      AIRFLOW__DATAHUB__ENABLED: "true"
      AIRFLOW_CONN_DATAHUB_REST_DEFAULT: '{"conn_type":"datahub_rest","host":"http://datahub-gms:8080"}'

  datahub-postgres-setup:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        export PGPASSWORD=postgres
        until pg_isready -h postgres -U postgres -d postgres; do
          sleep 2
        done
        psql -h postgres -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
        DO $$$$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'datahub') THEN
            CREATE ROLE datahub LOGIN PASSWORD 'datahub_password';
          ELSE
            ALTER ROLE datahub WITH LOGIN PASSWORD 'datahub_password';
          END IF;
        END
        $$$$;
        SELECT 'CREATE DATABASE datahub OWNER datahub'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'datahub')\gexec
        GRANT ALL PRIVILEGES ON DATABASE datahub TO datahub;
        SQL
    networks:
      - data-stack-network

  opensearch:
    image: opensearchproject/opensearch:2.19.3
    hostname: search
    container_name: datahub_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      ES_JAVA_OPTS: "-Xms256m -Xmx512m"
      OPENSEARCH_JAVA_OPTS: "-Xms768m -Xmx1024m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=0s'"]
      interval: 5s
      timeout: 15s
      retries: 10
      start_period: 60s
    volumes:
      - datahub_opensearch_data:/usr/share/opensearch/data
    networks:
      - data-stack-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.0
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_DEBUG: "true"
    networks:
      - data-stack-network

  datahub-system-update:
    image: acryldata/datahub-upgrade:v1.5.0.6
    hostname: datahub-system-update
    command: ["-u", "SystemUpdate"]
    depends_on:
      datahub-postgres-setup:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      opensearch:
        condition: service_healthy
    environment:
      EBEAN_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/datahub"
      EBEAN_DATASOURCE_DRIVER: "org.postgresql.Driver"
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub_password
      EBEAN_DATASOURCE_HOST: postgres:5432
      ELASTICSEARCH_HOST: search
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_PROTOCOL: http
      ELASTICSEARCH_USE_SSL: "false"
      ELASTICSEARCH_IMPLEMENTATION: opensearch
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_REFRESH_INTERVAL_SECONDS: "3"
      ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES: "false"
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      GRAPH_SERVICE_IMPL: elasticsearch
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      DATAHUB_SQL_SETUP_ENABLED: "true"
      DATAHUB_PRECREATE_TOPICS: "true"
      METADATA_SERVICE_AUTH_ENABLED: "false"
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: "WnEdIeTG/VVCLQqGwC/BAkqyY0k+H8NEAtWGejrBI94="
      DATAHUB_TOKEN_SERVICE_SALT: "YouKnowNothingJohnSnow"
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_BASE_PATH: /
      DATAHUB_GMS_BASE_PATH: /
      KAFKA_SCHEMAREGISTRY_URL: "http://schema-registry:8081"
      SCHEMA_REGISTRY_TYPE: INTERNAL
      SCHEMA_REGISTRY_SYSTEM_UPDATE: "true"
      SPRING_KAFKA_PROPERTIES_AUTO_REGISTER_SCHEMAS: "true"
      SPRING_KAFKA_PROPERTIES_USE_LATEST_VERSION: "true"
      USE_CONFLUENT_SCHEMA_REGISTRY: "false"
      ENTITY_VERSIONING_ENABLED: "true"
      PARTITIONS: "3"
    networks:
      - data-stack-network

  datahub-gms:
    image: acryldata/datahub-gms:v1.5.0.6
    hostname: datahub-gms
    depends_on:
      datahub-system-update:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
    environment:
      EBEAN_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/datahub"
      EBEAN_DATASOURCE_DRIVER: "org.postgresql.Driver"
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub_password
      EBEAN_DATASOURCE_HOST: postgres:5432
      ELASTICSEARCH_HOST: search
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_PROTOCOL: http
      ELASTICSEARCH_USE_SSL: "false"
      ELASTICSEARCH_IMPLEMENTATION: opensearch
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_LIMIT_RESULTS_STRICT: "true"
      ES_BULK_REFRESH_POLICY: WAIT_UNTIL
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_SCHEMAREGISTRY_URL: "http://schema-registry:8081"
      GRAPH_SERVICE_IMPL: elasticsearch
      GRAPH_SERVICE_DIFF_MODE_ENABLED: "false"
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      METADATA_SERVICE_AUTH_ENABLED: "false"
      DATAHUB_TOKEN_SERVICE_SIGNING_KEY: "WnEdIeTG/VVCLQqGwC/BAkqyY0k+H8NEAtWGejrBI94="
      DATAHUB_TOKEN_SERVICE_SALT: "YouKnowNothingJohnSnow"
      DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID: generic-duhe-consumer-job-client-gms
      SCHEMA_REGISTRY_TYPE: INTERNAL
      SPRING_KAFKA_PROPERTIES_AUTO_REGISTER_SCHEMAS: "true"
      SPRING_KAFKA_PROPERTIES_USE_LATEST_VERSION: "true"
      USE_CONFLUENT_SCHEMA_REGISTRY: "false"
      MAE_CONSUMER_ENABLED: "false"
      MCE_CONSUMER_ENABLED: "true"
      PE_CONSUMER_ENABLED: "true"
      ENTITY_SERVICE_ENABLE_RETENTION: "true"
      ENTITY_VERSIONING_ENABLED: "true"
      UI_INGESTION_ENABLED: "true"
      ALTERNATE_MCP_VALIDATION: "true"
      CONFIG_ENTITY_REGISTRY_USE_OPTIMIZED_LOADING: "true"
      EXTRACT_JAR_ENABLED: "true"
      STRICT_URN_VALIDATION_ENABLED: "true"
      SEARCH_BAR_API_VARIANT: SEARCH_ACROSS_ENTITIES
      POLICY_CACHE_REFRESH_INTERVAL_SECONDS: "120"
      DATAHUB_SERVER_TYPE: quickstart
      DATAHUB_TELEMETRY_ENABLED: "false"
      DATAHUB_BASE_PATH: /
      DATAHUB_GMS_BASE_PATH: /
      SHOW_HOME_PAGE_REDESIGN: "true"
      SHOW_INGESTION_PAGE_REDESIGN: "true"
      SHOW_SEARCH_BAR_AUTOCOMPLETE_REDESIGN: "true"
      SHOW_HAS_SIBLINGS_FILTER: "true"
      THEME_V2_DEFAULT: "true"
      DATAHUB_EMIT_MODE: SYNC_PRIMARY
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --fail http://localhost:8080/health"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - data-stack-network

  datahub-actions:
    image: acryldata/datahub-actions:v0.0.15
    hostname: actions
    depends_on:
      datahub-gms:
        condition: service_healthy
      schema-registry:
        condition: service_started
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_GMS_PROTOCOL: http
      DATAHUB_SYSTEM_CLIENT_ID: __datahub_system
      DATAHUB_SYSTEM_CLIENT_SECRET: JohnSnowKnowsNothing
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      METADATA_AUDIT_EVENT_NAME: MetadataAuditEvent_v4
      METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME: MetadataChangeLog_Versioned_v1
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
    networks:
      - data-stack-network

  datahub-frontend:
    image: acryldata/datahub-frontend-react:v1.5.0.6
    hostname: datahub-frontend-react
    depends_on:
      datahub-gms:
        condition: service_healthy
    ports:
      - "9002:9002"
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: "YouKnowNothing"
      DATAHUB_APP_VERSION: "v1.5.0.6"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: "10MB"
      DATAHUB_TRACKING_TOPIC: DataHubUsageEvent_v1
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      ELASTIC_CLIENT_HOST: search
      ELASTIC_CLIENT_PORT: "9200"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      DATAHUB_BASE_PATH: /
      DATAHUB_GMS_BASE_PATH: /
      THEME_V2_DEFAULT: "true"
    networks:
      - data-stack-network

networks:
  data-stack-network:
    name: data-stack-network
    external: true

volumes:
  datahub_opensearch_data:
